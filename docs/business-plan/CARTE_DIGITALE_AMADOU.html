<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEXUS AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #0f172a;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,0.25) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    pointer-events: none;
  }
  .brand-name {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 0%, #67e8f9 50%, #06b6d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative; z-index: 1;
  }
  .brand-tagline {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
    position: relative; z-index: 1;
  }
  .qr-container {
    position: relative; z-index: 1;
    background: white;
    border-radius: 24px;
    padding: 20px;
    margin: 28px 0;
    box-shadow: 0 0 0 1px rgba(6,182,212,0.2), 0 0 40px rgba(6,182,212,0.15), 0 20px 60px rgba(0,0,0,0.4);
  }
  .qr-container img { width: 260px; height: 260px; display: block; }
  .scan-text {
    font-size: 16px; color: white; font-weight: 600;
    text-align: center; position: relative; z-index: 1;
  }
  .scan-sub {
    font-size: 12px; color: rgba(255,255,255,0.35);
    text-align: center; margin-top: 4px; margin-bottom: 32px;
    position: relative; z-index: 1;
  }
  .pill {
    display: inline-block;
    background: rgba(6,182,212,0.12);
    border: 1px solid rgba(6,182,212,0.25);
    color: #67e8f9;
    font-size: 11px; font-weight: 600;
    padding: 6px 16px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
  <div class="brand-name">NEXUS</div>
  <div class="brand-tagline">Intelligence Artificielle</div>
  <div class="qr-container">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&format=svg&color=0f172a&data=https%3A//nexus-backend-dev.onrender.com/commercial/amadou.html" alt="QR Code">
  </div>
  <div class="scan-text">Scannez pour decouvrir NEXUS</div>
  <div class="scan-sub">Contact + presentation + tarifs</div>
  <div class="pill">L'IA qui gere votre entreprise</div>
</body>
</html>
