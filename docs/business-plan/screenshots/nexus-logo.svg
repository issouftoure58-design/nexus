<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
  </defs>
  <!-- Cercle de fond -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <!-- Corps du robot (écran/moniteur) -->
  <rect x="55" y="62" width="90" height="66" rx="12" ry="12" fill="none" stroke="white" stroke-width="6"/>
  <!-- Écran intérieur -->
  <rect x="65" y="72" width="70" height="46" rx="6" ry="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Oeil gauche -->
  <circle cx="82" cy="92" r="7" fill="white"/>
  <!-- Oeil droit -->
  <circle cx="118" cy="92" r="7" fill="white"/>
  <!-- Bouche (sourire) -->
  <path d="M88 106 Q100 116 112 106" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Antenne -->
  <line x1="100" y1="62" x2="100" y2="42" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="38" r="6" fill="#48bb78"/>
  <!-- Pieds / support -->
  <line x1="80" y1="128" x2="80" y2="142" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="120" y1="128" x2="120" y2="142" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="70" y1="142" x2="130" y2="142" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Oreilles -->
  <rect x="40" y="80" width="15" height="20" rx="4" fill="white" opacity="0.7"/>
  <rect x="145" y="80" width="15" height="20" rx="4" fill="white" opacity="0.7"/>
</svg>