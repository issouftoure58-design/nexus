    <!-- Force cache clear for old versions -->
    <script>
      (function() {
        var APP_VERSION = '2026.02.27.1';
        var STORED_VERSION = localStorage.getItem('fha_app_version');

        // If version changed, clear everything and reload
        if (STORED_VERSION && STORED_VERSION !== APP_VERSION) {
          console.log('New version detected, clearing cache...');
          localStorage.setItem('fha_app_version', APP_VERSION);

          // Clear all caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              Promise.all(names.map(function(name) {
                return caches.delete(name);
              })).then(function() {
                // Force hard reload after cache clear
                window.location.reload(true);
              });
            });
          } else {
            window.location.reload(true);
          }
          return; // Stop execution
        }

        // Store current version
        localStorage.setItem('fha_app_version', APP_VERSION);

        // Unregister service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
          });
        }
      })();
    </script>
