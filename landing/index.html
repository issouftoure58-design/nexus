    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que NEXUS exactement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS est une plateforme SaaS tout-en-un propulsee par l'intelligence artificielle, concue pour les PME francophones. Elle regroupe un assistant telephone IA, un chatbot WhatsApp, un systeme de reservations en ligne, un CRM client, la comptabilite automatisee et des outils marketing — le tout dans une seule interface. NEXUS remplace jusqu'a 6 logiciels differents pour un seul abonnement."
          }
        },
        {
          "@type": "Question",
          "name": "Pour quels types de business NEXUS est-il adapte ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS s'adapte a 7 types de business : salons de coiffure et instituts beaute, restaurants et bars, hotels et hebergements, commerces et restauration rapide, entreprises de securite, services a domicile, et services de conseil ou formation. Chaque type beneficie de fonctionnalites specifiques adaptees a son metier."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je essayer NEXUS gratuitement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, NEXUS propose une offre Free 100% gratuite a vie, sans carte bancaire. Elle inclut jusqu'a 10 reservations par mois, 10 factures, un CRM jusqu'a 30 clients et l'acces a tous les modules en lecture/decouverte. Vous pouvez passer a Basic 29€/mois quand vous etes pret, sans interruption de service."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne l'assistant telephone IA ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'assistant telephone IA de NEXUS repond automatiquement a 100% de vos appels, 24h/24 et 7j/7. Il comprend le francais naturellement, prend les reservations, repond aux questions frequentes sur vos services et horaires, et peut meme gerer les modifications de rendez-vous."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne l'integration WhatsApp Business ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS se connecte a votre numero WhatsApp Business pour repondre automatiquement a vos clients. L'IA conversationnelle gere les demandes de rendez-vous, les questions sur vos tarifs, les confirmations et rappels automatiques."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coute NEXUS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS propose 3 niveaux d'acces : Free gratuit a vie (10 reservations et 10 factures par mois), Basic a 29 euros par mois pour un acces illimite a toutes les fonctions non-IA avec 1 000 credits IA inclus chaque mois (valeur 15 euros), et Business a 149 euros par mois pour les multi-sites avec white-label, API et 10 000 credits IA inclus chaque mois (valeur 150 euros). Les fonctions IA (telephone IA, WhatsApp IA, marketing IA, articles SEO) consomment des credits universels (1,5 euro = 100 credits). Un pack unique additionnel est disponible au taux base : Pack 1000 a 15 euros pour 1 000 credits. Vous ne payez que ce que vous consommez au-dela des credits inclus."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la difference entre les plans Free, Basic et Business ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le plan Free est gratuit a vie et permet de decouvrir NEXUS avec 10 reservations et 10 factures par mois, ideal pour demarrer. Le plan Basic a 29 euros par mois debloque l'acces illimite a toutes les fonctions non-IA (reservations, facturation, CRM, comptabilite, RH, equipe, fidelite, workflows, devis, SEO) et inclut 1 000 credits IA chaque mois (valeur 15 euros). Le plan Business a 149 euros par mois ajoute la gestion multi-sites, le white-label avec votre propre domaine, l'API et les webhooks, le SSO entreprise, le support prioritaire 1 heure, un account manager dedie et 10 000 credits IA inclus chaque mois (valeur 150 euros)."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionnent les credits IA NEXUS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS utilise un systeme de credits universels pour toutes les fonctions IA, similaire a Twilio ou OpenAI. Le taux base est 1,5 euro pour 100 credits, soit 0,015 euro par credit. Chaque plan payant inclut deja des credits : Basic inclut 1 000 credits par mois (valeur 15 euros), Business inclut 10 000 credits par mois (valeur 150 euros). Si vous avez besoin de plus, un pack unique additionnel est disponible : Pack 1000 a 15 euros pour 1 000 credits au taux base (sans bonus). Voici quelques exemples de consommation : 1 question chat IA admin coute 4 credits, 1 message WhatsApp IA repondu coute 4 credits, 1 minute d'appel telephone IA coute 15 credits, 1 post reseaux sociaux genere coute 9 credits, 1 article SEO complet de 1500 mots coute 66 credits. Mode degrade gracieux a 0 credit sans surprise."
          }
        },
        {
          "@type": "Question",
          "name": "L'assistant IA comprend-il le francais ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Parfaitement. Tous les assistants NEXUS — WhatsApp, telephone et chat web — communiquent naturellement en francais. L'IA comprend le langage courant, les expressions et s'adapte au vocabulaire de votre metier. Elle peut aussi repondre en anglais si vos clients sont internationaux."
          }
        },
        {
          "@type": "Question",
          "name": "Mes donnees sont-elles securisees ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La securite est au coeur de NEXUS. Vos donnees sont hebergees en Europe avec chiffrement SSL de bout en bout. Chaque entreprise dispose d'un espace completement isole. NEXUS est conforme au RGPD avec suppression des donnees sur demande et consentement explicite."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le CRM integre ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le CRM de NEXUS centralise automatiquement toutes les interactions avec vos clients : reservations, appels, messages WhatsApp, historique des visites et preferences. Vous pouvez segmenter vos clients, envoyer des campagnes ciblees et suivre la valeur de chaque client dans le temps."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je changer de plan a tout moment ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, vous pouvez upgrader ou downgrader votre plan a tout moment depuis votre tableau de bord. La facturation est ajustee au prorata, sans frais caches."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que NEXUS remplace mon logiciel de reservation actuel ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, NEXUS integre un systeme complet de reservations en ligne adapte a votre metier. Vos clients reservent 24h/24 via votre site, WhatsApp ou par telephone IA. Le systeme gere la disponibilite en temps reel, les confirmations automatiques et les rappels."
          }
        },
        {
          "@type": "Question",
          "name": "Comment migrer vers NEXUS depuis un autre logiciel ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'equipe NEXUS vous accompagne gratuitement dans la migration de vos donnees. Nous importons votre fichier clients, votre historique de reservations et vos services. La mise en route prend generalement moins de 48 heures."
          }
        },
        {
          "@type": "Question",
          "name": "NEXUS propose-t-il une application mobile ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS est une application web responsive qui fonctionne parfaitement sur smartphone, tablette et ordinateur. Vous pouvez l'ajouter a votre ecran d'accueil comme une application native."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le support client NEXUS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le plan Free et le plan Basic incluent le support par email avec reponse sous 24 heures. Le plan Business beneficie d'un support prioritaire avec premiere reponse en 1 heure, d'un account manager dedie et de sessions de formation personnalisees. Notre equipe est basee en France et communique en francais."
          }
        }
      ]
    }
    </script>
