    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que NEXUS exactement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS est une plateforme SaaS tout-en-un propulsee par l'intelligence artificielle, concue pour les PME francophones. Elle regroupe un assistant telephone IA, un chatbot WhatsApp, un systeme de reservations en ligne, un CRM client, la comptabilite automatisee et des outils marketing — le tout dans une seule interface. NEXUS remplace jusqu'a 6 logiciels differents pour un seul abonnement."
          }
        },
        {
          "@type": "Question",
          "name": "Pour quels types de business NEXUS est-il adapte ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS s'adapte a 7 types de business : salons de coiffure et instituts beaute, restaurants et bars, hotels et hebergements, commerces et restauration rapide, entreprises de securite, services a domicile, et services de conseil ou formation. Chaque type beneficie de fonctionnalites specifiques adaptees a son metier."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je essayer NEXUS gratuitement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, NEXUS propose un essai gratuit de 14 jours sans carte bancaire requise. Vous avez acces a toutes les fonctionnalites de votre plan pour tester la plateforme en conditions reelles. A la fin de l'essai, vous pouvez choisir le plan qui vous convient ou simplement arreter sans engagement."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne l'assistant telephone IA ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'assistant telephone IA de NEXUS repond automatiquement a 100% de vos appels, 24h/24 et 7j/7. Il comprend le francais naturellement, prend les reservations, repond aux questions frequentes sur vos services et horaires, et peut meme gerer les modifications de rendez-vous."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne l'integration WhatsApp Business ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS se connecte a votre numero WhatsApp Business pour repondre automatiquement a vos clients. L'IA conversationnelle gere les demandes de rendez-vous, les questions sur vos tarifs, les confirmations et rappels automatiques."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coute NEXUS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS propose 3 plans : Starter a 99 euros par mois pour les independants, Pro a 249 euros par mois avec WhatsApp IA et telephone IA inclus, et Business a 499 euros par mois pour les multi-sites avec support dedie. Des tarifs annuels avec reduction sont disponibles."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la difference entre les plans Starter, Pro et Business ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le plan Starter inclut le chatbot web IA, les reservations en ligne et le CRM de base. Le plan Pro ajoute l'assistant WhatsApp IA, le telephone IA, la comptabilite automatisee et les outils marketing. Le plan Business offre tout le Pro plus le support dedie, les integrations avancees et la gestion multi-sites."
          }
        },
        {
          "@type": "Question",
          "name": "L'assistant IA comprend-il le francais ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Parfaitement. Tous les assistants NEXUS — WhatsApp, telephone et chat web — communiquent naturellement en francais. L'IA comprend le langage courant, les expressions et s'adapte au vocabulaire de votre metier. Elle peut aussi repondre en anglais si vos clients sont internationaux."
          }
        },
        {
          "@type": "Question",
          "name": "Mes donnees sont-elles securisees ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La securite est au coeur de NEXUS. Vos donnees sont hebergees en Europe avec chiffrement SSL de bout en bout. Chaque entreprise dispose d'un espace completement isole. NEXUS est conforme au RGPD avec suppression des donnees sur demande et consentement explicite."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le CRM integre ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le CRM de NEXUS centralise automatiquement toutes les interactions avec vos clients : reservations, appels, messages WhatsApp, historique des visites et preferences. Vous pouvez segmenter vos clients, envoyer des campagnes ciblees et suivre la valeur de chaque client dans le temps."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je changer de plan a tout moment ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, vous pouvez upgrader ou downgrader votre plan a tout moment depuis votre tableau de bord. La facturation est ajustee au prorata, sans frais caches."
          }
        },
        {
          "@type": "Question",
          "name": "Est-ce que NEXUS remplace mon logiciel de reservation actuel ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, NEXUS integre un systeme complet de reservations en ligne adapte a votre metier. Vos clients reservent 24h/24 via votre site, WhatsApp ou par telephone IA. Le systeme gere la disponibilite en temps reel, les confirmations automatiques et les rappels."
          }
        },
        {
          "@type": "Question",
          "name": "Comment migrer vers NEXUS depuis un autre logiciel ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'equipe NEXUS vous accompagne gratuitement dans la migration de vos donnees. Nous importons votre fichier clients, votre historique de reservations et vos services. La mise en route prend generalement moins de 48 heures."
          }
        },
        {
          "@type": "Question",
          "name": "NEXUS propose-t-il une application mobile ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NEXUS est une application web responsive qui fonctionne parfaitement sur smartphone, tablette et ordinateur. Vous pouvez l'ajouter a votre ecran d'accueil comme une application native."
          }
        },
        {
          "@type": "Question",
          "name": "Comment fonctionne le support client NEXUS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tous les plans incluent le support par email avec reponse sous 24 heures. Le plan Pro ajoute le support prioritaire. Le plan Business beneficie d'un account manager dedie et de sessions de formation personnalisees. Notre equipe est basee en France."
          }
        }
      ]
    }
    </script>
